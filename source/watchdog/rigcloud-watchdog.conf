# rigcloud-watchdog.conf
#
# Per-algorithm health thresholds for rigcloud_watchdog.py. A fixed global
# "hashrate must be > X" check doesn't work across algos - a few KH/s is
# normal for one algo and a dead miner for another - so thresholds are
# looked up per algorithm instead.
#
# Format (comma-separated, one algorithm per line):
#
#   ALGO,MIN_HASHRATE_HS,MIN_WATTS_TOTAL,GRACE_CHECKS,COOLDOWN_SECONDS
#
#   ALGO              Algorithm name as reported by rigcloud_telemetry's
#                      "algorithm" field (case-insensitive). Matches what
#                      shows up in the dashboard's per-rig hashrate line,
#                      e.g. "keryxhash", "kheavyhash", "verushash", "zhash".
#
#   MIN_HASHRATE_HS    Minimum acceptable *combined* hashrate (H/s) across
#                      every GPU (or CPU thread, in --mode cpu) mining this
#                      algo, summed together. Set to 0 to disable this
#                      check for the algo (e.g. for a node process like
#                      keryxd that reports something other than a real
#                      hashrate on this field).
#
#   MIN_WATTS_TOTAL    Minimum acceptable combined GPU power draw (watts)
#                      while this algo is active - catches a miner process
#                      that's technically "running" but the GPU has fallen
#                      idle (driver hang, crashed kernel, etc). Set to 0 to
#                      disable. Ignored entirely when the watchdog is
#                      running with --mode cpu.
#
#   GRACE_CHECKS       Number of consecutive failing checks required
#                      before a restart is triggered - debounces brief,
#                      normal dips (e.g. a pool share submission stall).
#
#   COOLDOWN_SECONDS   Minimum time between auto-restarts triggered by
#                      this algo's thresholds, so a genuinely broken rig
#                      doesn't get restart-looped forever.
#
# DEFAULT is used for any algo not explicitly listed below, and also
# covers the case where the miner service is active but no algo/hashrate
# is being reported at all (i.e. the miner isn't really running).
#
# Edit the values below to match what's actually normal for each of your
# rigs/algos, then:
#   sudo systemctl restart rigcloud_watchdog_gpu.service
#   sudo systemctl restart rigcloud_watchdog_cpu.service

# ALGO,MIN_HASHRATE_HS,MIN_WATTS_TOTAL,GRACE_CHECKS,COOLDOWN_SECONDS
DEFAULT,1,20,3,600

# ---- example GPU algos - tune to your actual cards/pools ----
kheavyhash,50000000,120,3,600
keryxhash,1000000,60,3,600
verushash,3000,70,3,600
zhash,20,90,3,600

# ---- keryxd is a node process, not a hasher - only check power draw is
#      non-zero (a fresh block-height number would be a better signal,
#      but the watchdog only sees the generic hashrate_hs/power fields) ----
keryxd-node,0,0,3,600
